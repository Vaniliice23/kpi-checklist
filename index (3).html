<!DOCTYPE html>
<html lang="ru" style="background:#14161b;margin:0;padding:0;width:100%;height:100%">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14161b">
<title>КПИ · Чек-лист отделов</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="КПИ Чек-лист">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-startup-image" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 540 720'><rect fill='%2314161b' width='540' height='720'/><text x='270' y='360' font-size='28' font-weight='800' fill='%23d9a441' text-anchor='middle'>КПИ Чек-лист</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%2314161b' width='180' height='180' rx='40'/></svg>">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%2314161b' width='32' height='32'/></svg>">

<style>
  :root{--bg:#14161b;--bg-elev:#1c1f26;--bg-elev2:#242830;--line:#2c313b;--text:#eef0f3;--text-dim:#8b93a1;--text-dim2:#5f6673;--accent:#d9a441;--accent-ink:#1a1200;--done:#4caf7d;--radius:16px;--safe-bottom:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,0px);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:#14161b;color:#eef0f3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100%;width:100%;overflow:hidden;}
  body{display:flex;flex-direction:column;}
  ::-webkit-scrollbar{display:none;}
</style>
</head>
<body>

<header style="padding:calc(14px + var(--safe-top)) 16px 12px;background:linear-gradient(180deg,var(--bg-elev),var(--bg));border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;">
  <div style="display:flex;align-items:baseline;justify-content:space-between;gap:10px;">
    <h1 style="font-size:16px;font-weight:800;margin:0;">Чек-лист старших продавцов</h1>
    <small id="clock" style="color:var(--text-dim);font-size:12px;font-weight:700;">--:--</small>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-top:11px;">
    <input type="date" id="datePicker" style="flex:1;background:var(--bg-elev2);border:1px solid var(--line);color:var(--text);font-weight:600;font-size:14px;padding:10px 11px;border-radius:11px;-webkit-appearance:none;">
    <button id="todayBtn" style="background:none;border:1px solid var(--line);color:var(--text-dim);font-size:12.5px;font-weight:700;padding:10px 13px;border-radius:11px;">Сегодня</button>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:10px;">
    <div id="sectionDesc" style="font-size:12.5px;color:var(--text-dim);flex:1;"></div>
    <div style="width:30px;height:30px;border-radius:50%;background:conic-gradient(var(--accent) calc(var(--pct,0)*1%),var(--bg-elev2) 0);position:relative;" id="progressRing">
      <div style="position:absolute;inset:4px;border-radius:50%;background:var(--bg-elev);"></div>
    </div>
  </div>
</header>

<main id="main" style="flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch;"></main>

<nav style="position:fixed;left:0;right:0;bottom:0;display:flex;background:var(--bg-elev);border-top:1px solid var(--line);padding:8px 6px calc(8px + var(--safe-bottom));z-index:30;">
  <button class="tab" data-tab="daily5" style="flex:1;background:none;border:none;color:var(--text-dim);display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;border-radius:12px;font-size:10.5px;font-weight:700;cursor:pointer;">🚪<br>Проходная</button>
  <button class="tab" data-tab="daily1" style="flex:1;background:none;border:none;color:var(--text-dim);display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;border-radius:12px;font-size:10.5px;font-weight:700;cursor:pointer;">🧍<br>Вид</button>
  <button class="tab" data-tab="monthly4" style="flex:1;background:none;border:none;color:var(--text-dim);display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;border-radius:12px;font-size:10.5px;font-weight:700;cursor:pointer;">🏷️<br>Ценники</button>
</nav>

<div id="configModal" style="position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:99;">
  <div style="background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius);padding:20px;max-width:360px;width:90%;">
    <h3 style="margin:0 0 12px;font-size:16px;font-weight:800;">URL Google Apps Script</h3>
    <input type="url" id="apiUrlInput" placeholder="https://script.google.com/macros/s/..." style="width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:9px;margin-bottom:12px;font-size:14px;">
    <button onclick="saveApiUrl()" style="width:100%;padding:12px;background:var(--accent);color:var(--accent-ink);border:none;border-radius:9px;font-weight:700;font-size:14px;cursor:pointer;">Сохранить</button>
  </div>
</div>

<div id="toast" style="position:fixed;left:50%;transform:translateX(-50%);bottom:calc(84px + var(--safe-bottom));background:#20242c;border:1px solid var(--line);color:var(--text);font-size:12.5px;font-weight:600;padding:9px 16px;border-radius:999px;z-index:40;opacity:0;transition:opacity .25s;display:flex;align-items:center;gap:6px;pointer-events:none;">
  <span style="width:7px;height:7px;border-radius:50%;background:var(--done);"></span>
  <span id="toastText">Сохранено</span>
</div>

<script>
const ALL_DEPTS=["Краски","Обои","Ламинат/Плинтуса","Плитка","Сантехника","Хозмаг","Двери"];
const SLOTS=["10:00","12:00","14:00","16:00","18:00"];
const DEPT_COLORS={"Краски":"#d9a441","Обои":"#7fb3d5","Ламинат/Плинтуса":"#c99a6b","Плитка":"#8ec6a6","Сантехника":"#8aa6c9","Хозмаг":"#d98a6b","Двери":"#5f6673"};
const SECTIONS={daily5:[{type:"prohodnaya",label:"Контроль проходной",sub:"Проверка каждые 2 часа",weight:".30",slotted:1,note:0},{type:"kofe",label:"Кофе/чай для гостей",sub:"Наличие угощения",weight:".10",slotted:1,note:0}],daily1:[{type:"vneshniy",label:"Внешний вид продавцов",sub:"Форма, бейдж, опрятность",weight:".05",slotted:0,note:1},{type:"rabmesto",label:"Порядок на рабочем месте",sub:"Чистота за стойкой",weight:".05",slotted:0,note:1}],monthly4:[{type:"poryadok",label:"Порядок в отделе",sub:"~4 раза в месяц",weight:".10",slotted:0,note:1},{type:"cenniki",label:"Ценники",sub:"~4 раза в месяц",weight:".10",slotted:0,note:1}]};
const TAB_DESC={daily5:"По каждому времени проверки",daily1:"Один раз в день",monthly4:"В дни обходов"};
let currentTab="daily5",currentDate=todayStr(),currentSlot=nearestSlot(),dayState={},pendingQueue=[],flushTimer=null,BASE_URL=localStorage.getItem("kpi_api_url")||"";
function todayStr(){const e=new Date;return e.getFullYear()+"-"+String(e.getMonth()+1).padStart(2,"0")+"-"+String(e.getDate()).padStart(2,"0")}
function nearestSlot(){const e=new Date().getHours(),t=SLOTS.map(e=>parseInt(e));let a=SLOTS[0],r=99;return t.forEach((t,n)=>{const o=Math.abs(t-e);o<r&&(r=o,a=SLOTS[n])}),a}
function cacheKey(e){return"kpi_"+e}
function loadCache(e){try{return JSON.parse(localStorage.getItem(cacheKey(e)))||{}}catch(e){return{}}}
function saveCache(e){try{localStorage.setItem(cacheKey(e),JSON.stringify(dayState))}catch(e){}}
function saveApiUrl(){const e=document.getElementById("apiUrlInput").value;e.includes("/exec")?(BASE_URL=e.trim(),localStorage.setItem("kpi_api_url",BASE_URL),document.getElementById("configModal").style.display="none",loadData()):alert("URL должен заканчиваться на /exec")}
async function loadData(){dayState=loadCache(currentDate),render(),BASE_URL&&(await fetch(BASE_URL+"?action=state&date="+currentDate).then(e=>e.json()).then(e=>{e.ok&&(dayState=e.data||{},saveCache(currentDate),render())}).catch(()=>{}))}
function queuePush(e){pendingQueue.push(e),localStorage.setItem("kpi_queue",JSON.stringify(pendingQueue)),scheduleFlush()}
function scheduleFlush(){clearTimeout(flushTimer),flushTimer=setTimeout(flushQueue,250)}
async function flushQueue(){if(!pendingQueue.length||!BASE_URL)return;const e=pendingQueue[0];try{const t=await fetch(BASE_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(e)}),a=await t.json();a.ok?(pendingQueue.shift(),localStorage.setItem("kpi_queue",JSON.stringify(pendingQueue)),showToast("Сохранено"),pendingQueue.length&&scheduleFlush()):(showToast("Ошибка",1),setTimeout(flushQueue,8e3))}catch(e){showToast("Нет связи",1),setTimeout(flushQueue,8e3)}}
setInterval(()=>pendingQueue.length&&flushQueue(),15e3);
function showToast(e,t){const a=document.getElementById("toast");document.getElementById("toastText").textContent=e,a.style.opacity=t?"0.7":"1",a.style.opacity="1",clearTimeout(showToast.h),showToast.h=setTimeout(()=>a.style.opacity="0",1800)}
function getEntry(e,t,a){const r=t||"_";return dayState[e]||(dayState[e]={}),dayState[e][r]||(dayState[e][r]={}),dayState[e][r][a]||(dayState[e][r][a]={done:0,note:""}),dayState[e][r][a]}
function toggle(e,t,a,r){const n=getEntry(e,t,a);n.done=r?1:0,saveCache(currentDate),queuePush({date:currentDate,type:e,slot:t||"",entries:[{dept:a,done:n.done,note:n.note}]}),render()}
function setNote(e,t,a,r){getEntry(e,t,a).note=r,saveCache(currentDate),queuePush({date:currentDate,type:e,slot:t||"",entries:[{dept:a,done:getEntry(e,t,a).done,note:r}]})}
function countDone(e,t){const a=t||"_",r=dayState[e.type]&&dayState[e.type][a]||{};let n=0;return ALL_DEPTS.forEach(e=>{r[e]&&r[e].done&&n++}),n}
function render(){const e=document.getElementById("main");e.innerHTML="";const t=SECTIONS[currentTab];t.some(e=>e.slotted)&&(e.innerHTML+="<div style='display:flex;gap:6px;margin-bottom:14px;overflow-x:auto'>"+SLOTS.map(e=>`<button style='flex:0 0 auto;padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:${e===currentSlot?"var(--accent)":"var(--bg-elev)"};color:${e===currentSlot?"var(--accent-ink)":"var(--text-dim)"};font-weight:700;font-size:13px;cursor:pointer' onclick='currentSlot="${e}";render()'>${e}</button>`).join("")+"</div>");const a=document.getElementById("progressRing");let r=0,n=0;t.forEach(t=>{const o=t.slotted?currentSlot:"";r+=countDone(t,o),n+=ALL_DEPTS.length}),a.style.background=`conic-gradient(var(--accent) calc(${n?Math.round(r/n*100):0}*1%),var(--bg-elev2) 0)`,document.getElementById("sectionDesc").textContent=TAB_DESC[currentTab],t.forEach(t=>{const a=t.slotted?currentSlot:"",r=countDone(t,a);e.innerHTML+=`<div style="background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:16px;overflow:hidden"><div style="padding:14px;border-bottom:1px solid var(--line)"><h2 style="font-size:15px;margin:0 0 2px;font-weight:800">${t.label}</h2><p style="font-size:11px;color:var(--text-dim2);margin:0;line-height:1.3">${t.sub}</p><div style="display:flex;gap:8px;margin-top:10px;font-size:11px"><span style="color:var(--accent);background:rgba(217,164,65,.12);padding:3px 8px;border-radius:6px;font-weight:800">вес ${t.weight}</span><span style="color:var(--text-dim);background:var(--bg-elev2);padding:3px 8px;border-radius:6px;font-weight:800">${r}/${ALL_DEPTS.length}</span></div></div>`;let n="";ALL_DEPTS.forEach(o=>{const c=getEntry(t.type,a,o);n+=`<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer" onclick="toggle('${t.type}','${a}','${o}',${c.done?0:1})"><div style="width:32px;height:32px;border-radius:8px;background:${DEPT_COLORS[o]||"#8b93a1"};color:#14161b;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex:0 0 auto">${o.charAt(0)}</div><div style="flex:1"><div style="font-size:14px;font-weight:700">${o}</div></div><div style="width:48px;height:28px;border-radius:999px;background:${c.done?"var(--done-bg)":"var(--bg-elev2)"};border:1px solid ${c.done?"var(--done)":"var(--line)"};position:relative;flex:0 0 auto"><div style="position:absolute;top:2px;left:${c.done?"22px":"2px"};width:22px;height:22px;border-radius:999px;background:${c.done?"var(--done)":"var(--text-dim)"};transition:left .16s"></div></div></div>`});e.innerHTML+=n+"</div>"});const o=document.createElement("div");o.textContent="Отметки сохраняются мгновенно",o.style.cssText="color:var(--text-dim2);font-size:11px;padding:8px;text-align:center;margin-top:8px",e.appendChild(o)}
document.querySelectorAll(".tab").forEach(e=>{e.onclick=()=>{document.querySelectorAll(".tab").forEach(e=>e.style.color="var(--text-dim)"),e.style.color="var(--accent)",currentTab=e.dataset.tab,render()}}),document.querySelector(".tab").style.color="var(--accent)",document.getElementById("datePicker").value=currentDate,document.getElementById("datePicker").onchange=e=>{currentDate=e.target.value||todayStr(),loadData()},document.getElementById("todayBtn").onclick=()=>{currentDate=todayStr(),document.getElementById("datePicker").value=currentDate,loadData()};
function tickClock(){const e=new Date;document.getElementById("clock").textContent=String(e.getHours()).padStart(2,"0")+":"+String(e.getMinutes()).padStart(2,"0")}
tickClock(),setInterval(tickClock,3e4);
try{const e=JSON.parse(localStorage.getItem("kpi_queue")||"[]");pendingQueue=e,e.length&&flushQueue()}catch(e){}
BASE_URL?(loadData(),document.getElementById("configModal").style.display="none"):(document.getElementById("configModal").style.display="flex",document.getElementById("apiUrlInput").focus());
if("serviceWorker"in navigator)setTimeout(()=>{navigator.serviceWorker.register("sw.js").catch(()=>{})},2e3);
</script>
</body>
</html>
