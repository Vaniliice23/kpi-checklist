<!-- Критический CSS для мгновенного отклика -->
<style>

  html,body{background:#14161b;color:#eef0f3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100%;width:100%;overflow:hidden;}
  body{display:flex;flex-direction:column;opacity:0;animation:fadein .25s ease forwards .1s;}

  /* Splash/Loading screen */
  .splash{position:fixed;inset:0;background:#14161b;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;animation:splash-fade .4s ease forwards .5s;}

  .splash h1{font-size:20px;font-weight:800;color:#d9a441;margin-bottom:8px;}

</head>
<body>

<div class="splash">

  <p>Загрузка…</p>
</div>

<header style="padding:calc(14px + var(--safe-top)) 16px 12px;background:linear-gradient(180deg,var(--bg-elev),var(--bg));border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;">
  <div style="display:flex;align-items:baseline;justify-content:space-between;gap:10px;">

  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:10px;">

<nav style="position:fixed;left:0;right:0;bottom:0;display:flex;background:var(--bg-elev);border-top:1px solid var(--line);padding:8px 6px calc(8px + var(--safe-bottom));z-index:30;">

    <span style="font-size:20px;">🚪</span><span style="font-size:10.5px;font-weight:700;text-align:center;line-height:1.15;">Проходная и кофе</span>
  </button>
  <button class="tab-btn" data-tab="daily1" style="flex:1;background:none;border:none;color:var(--text-dim);font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border-radius:12px;">
    <span style="font-size:20px;">🧍</span><span style="font-size:10.5px;font-weight:700;text-align:center;line-height:1.15;">Вид и раб.место</span>

  </button>

<div class="toast" id="toast" style="position:fixed;left:50%;transform:translateX(-50%);bottom:calc(84px + var(--safe-bottom));background:#20242c;border:1px solid var(--line);color:var(--text);font-size:12.5px;font-weight:600;padding:9px 16px;border-radius:999px;z-index:40;opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;display:flex;align-items:center;gap:6px;">

<div class="modal-overlay" id="configModal" style="position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:99;">

  </div>
</div>

<style id="app-styles">

<script>
