<!DOCTYPE html>
<html lang="ru" style="background:#14161b">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="description" content="КПИ Чек-лист отделов — мобильное приложение для управления мотивацией старших продавцов">
<title>КПИ · Чек-лист отделов</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14161b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="КПИ Чек-лист">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%2314161b' width='180' height='180'/></svg>">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%2314161b' width='32' height='32'/><path fill='%23d9a441' d='M8 10h14v2H8zm0 5h14v2H8zm0 5h14v2H8z'/></svg>">
<style>
  :root{
    --bg:#14161b;
    --bg-elev:#1c1f26;
    --bg-elev2:#242830;
    --bg-elev3:#2b303a;
    --line:#2c313b;
    --text:#eef0f3;
    --text-dim:#8b93a1;
    --text-dim2:#5f6673;
    --accent:#d9a441;
    --accent-ink:#1a1200;
    --done:#4caf7d;
    --done-bg:rgba(76,175,125,.14);
    --bad:#e2664f;
    --bad-bg:rgba(226,102,79,.14);
    --radius:16px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif; height:100%; overscroll-behavior-y:none;}
  body{display:flex; flex-direction:column; opacity:0; animation:fadein .25s ease forwards;}
  @keyframes fadein{ to{opacity:1;} }

  header{
    padding:calc(14px + var(--safe-top)) 16px 12px; background:linear-gradient(180deg,var(--bg-elev),var(--bg));
    border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20;
  }
  .brand{display:flex; align-items:baseline; justify-content:space-between; gap:10px;}
  .brand h1{font-size:16px; font-weight:800; letter-spacing:.2px; margin:0;}
  .brand small{color:var(--text-dim); font-size:12px; font-weight:700; font-variant-numeric:tabular-nums;}
  .date-row{display:flex; align-items:center; gap:8px; margin-top:11px;}
  .date-row input[type=date]{
    flex:1; background:var(--bg-elev2); border:1px solid var(--line); color:var(--text);
    font-weight:600; font-size:14px; padding:10px 11px; border-radius:11px;
    -webkit-appearance:none; appearance:none;
  }
  .today-btn{background:none; border:1px solid var(--line); color:var(--text-dim); font-size:12.5px;
    font-weight:700; padding:10px 13px; border-radius:11px; white-space:nowrap;}
  .today-btn:active{background:var(--bg-elev2);}

  .section-intro{display:flex; align-items:center; justify-content:space-between; margin-top:12px; gap:10px;}
  .section-intro .desc{font-size:12.5px; color:var(--text-dim); line-height:1.4; flex:1;}
  .day-progress{display:flex; align-items:center; gap:7px; flex:0 0 auto;}
  .day-progress .ring{width:30px; height:30px; border-radius:50%; position:relative; flex:0 0 auto;
    background:conic-gradient(var(--accent) calc(var(--pct,0)*1%), var(--bg-elev2) 0);}
  .day-progress .ring::after{content:""; position:absolute; inset:4px; border-radius:50%; background:var(--bg-elev);}

  main{flex:1; overflow-y:auto; padding:14px 14px calc(100px + var(--safe-bottom)); -webkit-overflow-scrolling:touch;}

  .slot-row{display:flex; gap:6px; margin-bottom:14px; overflow-x:auto; padding-bottom:2px;}
  .slot-chip{flex:0 0 auto; padding:9px 15px; border-radius:999px; border:1px solid var(--line);
    background:var(--bg-elev); color:var(--text-dim); font-weight:700; font-size:13px;}
  .slot-chip.active{background:var(--accent); border-color:var(--accent); color:var(--accent-ink);}

  .section{background:var(--bg-elev); border:1px solid var(--line); border-radius:var(--radius);
    margin-bottom:16px; overflow:hidden;}
  .section-head{padding:14px 14px 12px; border-bottom:1px solid var(--line);}
  .section-head-top{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .section-head h2{font-size:15px; margin:0; font-weight:800;}
  .section-sub{font-size:11.5px; color:var(--text-dim2); margin-top:2px; line-height:1.4;}
  .head-right{display:flex; align-items:center; gap:8px; flex:0 0 auto;}
  .weight-tag{font-size:11px; color:var(--accent); font-weight:800; background:rgba(217,164,65,.12);
    padding:4px 9px; border-radius:8px; white-space:nowrap;}
  .progress-pill{font-size:11px; font-weight:800; color:var(--text-dim); background:var(--bg-elev2);
    padding:4px 9px; border-radius:8px; white-space:nowrap;}
  .progress-pill.full{color:var(--done); background:var(--done-bg);}
  .mark-all{margin-top:10px; width:100%; font-size:12.5px; font-weight:700; color:var(--accent);
    background:rgba(217,164,65,.08); border:1px dashed #8a6a2c; border-radius:10px; padding:9px; }
  .mark-all:active{background:rgba(217,164,65,.16);}

  .dept-row{display:flex; align-items:center; gap:12px; padding:13px 14px; border-bottom:1px solid var(--line); cursor:pointer;}
  .dept-row:active{background:var(--bg-elev2);}
  .dept-row:last-child{border-bottom:none;}
  .dept-avatar{width:34px; height:34px; border-radius:10px; flex:0 0 auto; display:flex; align-items:center;
    justify-content:center; font-size:13px; font-weight:800; color:#14161b;}
  .dept-col{flex:1; display:flex; flex-direction:column; min-width:0;}
  .dept-name{font-size:14.5px; font-weight:700;}
  .note-dot{width:6px; height:6px; border-radius:50%; background:var(--accent); flex:0 0 auto;}
  .dept-sub{font-size:11px; color:var(--text-dim2); font-weight:500; margin-top:1px;}

  .note-toggle{align-self:flex-start; margin-top:6px; font-size:11.5px; color:var(--text-dim); background:var(--bg-elev2);
    border:none; padding:5px 10px; border-radius:8px; font-weight:600;}
  .note-input{width:100%; margin-top:8px; background:var(--bg); border:1px solid var(--line); color:var(--text);
    font-size:13px; padding:9px 10px; border-radius:9px; display:none;}
  .note-input.show{display:block;}

  .toggle{width:50px; height:30px; border-radius:999px; background:var(--bg-elev2); border:1px solid var(--line);
    position:relative; flex:0 0 auto;}
  .toggle .knob{position:absolute; top:2px; left:2px; width:24px; height:24px; border-radius:999px;
    background:var(--text-dim); transition:transform .16s ease, background .16s ease;}
  .toggle.on{background:var(--done-bg); border-color:var(--done);}
  .toggle.on .knob{transform:translateX(20px); background:var(--done);}

  nav.tabs{position:fixed; left:0; right:0; bottom:0; display:flex; background:var(--bg-elev);
    border-top:1px solid var(--line); padding:8px 6px calc(8px + var(--safe-bottom)); z-index:30;}
  .tab-btn{flex:1; background:none; border:none; color:var(--text-dim); font-family:inherit;
    display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px; border-radius:12px; position:relative;}
  .tab-btn:active{background:var(--bg-elev2);}
  .tab-btn .ic{font-size:20px; line-height:1;}
  .tab-btn .lb{font-size:10.5px; font-weight:700; text-align:center; line-height:1.15;}
  .tab-btn.active{color:var(--accent);}
  .tab-btn.active .ic{filter:drop-shadow(0 0 8px rgba(217,164,65,.35));}

  .toast{position:fixed; left:50%; transform:translateX(-50%); bottom:calc(84px + var(--safe-bottom));
    background:#20242c; border:1px solid var(--line); color:var(--text); font-size:12.5px; font-weight:600;
    padding:9px 16px; border-radius:999px; z-index:40; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;
    display:flex; align-items:center; gap:6px;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-4px);}
  .toast .dot{width:7px; height:7px; border-radius:50%; background:var(--done);}
  .toast.bad .dot{background:var(--bad);}

  .hint{color:var(--text-dim2); font-size:11.5px; padding:2px 4px 12px; line-height:1.5; text-align:center;}

  .modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:99;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:var(--bg-elev); border:1px solid var(--line); border-radius:var(--radius); 
    padding:20px; max-width:360px; width:90%; max-height:80vh; overflow-y:auto;}
  .modal-box h3{margin:0 0 12px; font-size:16px; font-weight:800;}
  .modal-box input, .modal-box button{width:100%; font-family:inherit;}
  .modal-box input{background:var(--bg); border:1px solid var(--line); color:var(--text); 
    padding:10px 12px; border-radius:9px; margin-bottom:10px; font-size:14px;}
  .modal-box button{padding:12px; border:none; border-radius:9px; font-weight:700; font-size:14px;}
  .modal-btn-ok{background:var(--accent); color:var(--accent-ink);}
  .modal-btn-ok:active{opacity:.8;}

  ::-webkit-scrollbar{display:none;}
</style>
</head>
<body>

<div class="modal-overlay" id="configModal">
  <div class="modal-box">
    <h3>Настройка приложения</h3>
    <p style="color:var(--text-dim); font-size:13px; margin:0 0 16px;">Вставьте URL вашего Google Apps Script Web App (заканчивается на /exec)</p>
    <input type="url" id="apiUrlInput" placeholder="https://script.google.com/macros/s/..." style="margin-bottom:12px;">
    <button class="modal-btn-ok" onclick="saveApiUrl()">Сохранить</button>
  </div>
</div>

<header>
  <div class="brand">
    <h1>Чек-лист старших продавцов</h1>
    <small id="clock">--:--</small>
  </div>
  <div class="date-row">
    <input type="date" id="datePicker">
    <button class="today-btn" id="todayBtn">Сегодня</button>
  </div>
  <div class="section-intro">
    <div class="desc" id="sectionDesc"></div>
    <div class="day-progress">
      <div class="ring" id="progressRing" style="--pct:0"></div>
    </div>
  </div>
</header>

<main id="main"></main>

<nav class="tabs">
  <button class="tab-btn" data-tab="daily5">
    <span class="ic">🚪</span><span class="lb">Проходная и кофе/чай</span>
  </button>
  <button class="tab-btn" data-tab="daily1">
    <span class="ic">🧍</span><span class="lb">Вид и раб.место</span>
  </button>
  <button class="tab-btn" data-tab="monthly4">
    <span class="ic">🏷️</span><span class="lb">Ценники и порядок</span>
  </button>
</nav>

<div class="toast" id="toast"><span class="dot"></span><span id="toastText">Сохранено</span></div>

<script>
const ALL_DEPTS = ["Краски","Обои","Ламинат/Плинтуса","Плитка","Сантехника","Хозмаг","Двери"];
const KPI_DEPTS = ALL_DEPTS.slice(0, 6);
const SLOTS = ["10:00","12:00","14:00","16:00","18:00"];

const DEPT_COLORS = {
  "Краски":"#d9a441", "Обои":"#7fb3d5", "Ламинат/Плинтуса":"#c99a6b",
  "Плитка":"#8ec6a6", "Сантехника":"#8aa6c9", "Хозмаг":"#d98a6b", "Двери":"#5f6673"
};
function deptInitial(d){ return d.charAt(0); }

const SECTIONS = {
  daily5: [
    { type:"prohodnaya", label:"Контроль проходной", sub:"Проверка входной группы каждые 2 часа", weight:".30", slotted:true, note:false },
    { type:"kofe",       label:"Кофе/чай для гостей", sub:"Наличие угощения для посетителей", weight:".10", slotted:true, note:false }
  ],
  daily1: [
    { type:"vneshniy", label:"Внешний вид продавцов", sub:"Форма, бейдж, опрятность — раз в день", weight:".05", slotted:false, note:true },
    { type:"rabmesto", label:"Порядок на рабочем месте", sub:"Чистота и порядок за кассой/стойкой", weight:".05", slotted:false, note:true }
  ],
  monthly4: [
    { type:"poryadok", label:"Порядок в отделе", sub:"Проверяется ~4 раза в месяц", weight:".10", slotted:false, note:true },
    { type:"cenniki",  label:"Ценники", sub:"Актуальность и наличие ценников, ~4 раза в месяц", weight:".10", slotted:false, note:true }
  ]
};
const TAB_DESC = {
  daily5: "Отмечайте по каждому времени проверки в течение дня",
  daily1: "Заполняется один раз в день на отдел",
  monthly4: "Отмечайте в дни плановых обходов"
};

let currentTab = "daily5";
let currentDate = todayStr();
let currentSlot = nearestSlot();
let dayState = {};
let pendingQueue = [];
let flushTimer = null;
let BASE_URL = "";

function todayStr(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function nearestSlot(){
  const h = new Date().getHours();
  const hours = SLOTS.map(s=>parseInt(s));
  let best = SLOTS[0], diff = 99;
  hours.forEach((hh,i)=>{ const dd=Math.abs(hh-h); if(dd<diff){diff=dd; best=SLOTS[i];} });
  return best;
}
function cacheKey(date){ return "kpi_cache_" + date; }

function loadLocalCache(date){
  try{ const raw = localStorage.getItem(cacheKey(date)); return raw ? JSON.parse(raw) : {}; }
  catch(e){ return {}; }
}
function saveLocalCache(date){
  try{ localStorage.setItem(cacheKey(date), JSON.stringify(dayState)); }catch(e){}
}
function loadQueue(){
  try{ const raw = localStorage.getItem("kpi_queue"); pendingQueue = raw ? JSON.parse(raw) : []; }
  catch(e){ pendingQueue = []; }
}
function saveQueue(){
  try{ localStorage.setItem("kpi_queue", JSON.stringify(pendingQueue)); }catch(e){}
}

function getApiUrl(){
  return localStorage.getItem("kpi_api_url") || "";
}
function setApiUrl(url){
  localStorage.setItem("kpi_api_url", url.trim());
  BASE_URL = url.trim();
}
function saveApiUrl(){
  const url = document.getElementById("apiUrlInput").value;
  if(!url.includes("/exec")) {
    alert("URL должен заканчиваться на /exec");
    return;
  }
  setApiUrl(url);
  document.getElementById("configModal").classList.remove("show");
  fetchDay(currentDate);
}

async function fetchDay(date){
  dayState = loadLocalCache(date);
  render();
  if(!BASE_URL) return;
  try{
    const res = await fetch(BASE_URL + "?action=state&date=" + date);
    const json = await res.json();
    if(json.ok){
      dayState = json.data || {};
      saveLocalCache(date);
      render();
    }
  }catch(e){ }
}
function queuePush(payload){
  pendingQueue.push(payload);
  saveQueue();
  scheduleFlush();
}
function scheduleFlush(){
  if(flushTimer) return;
  flushTimer = setTimeout(flushQueue, 250);
}
async function flushQueue(){
  flushTimer = null;
  if(!pendingQueue.length || !BASE_URL) return;
  const item = pendingQueue[0];
  try{
    const res = await fetch(BASE_URL, {
      method:"POST",
      headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify(item)
    });
    const json = await res.json();
    if(json.ok){
      pendingQueue.shift();
      saveQueue();
      showToast("Сохранено");
      if(pendingQueue.length) scheduleFlush();
    } else {
      showToast("Ошибка сохранения", true);
      setTimeout(scheduleFlush, 8000);
    }
  }catch(e){
    showToast("Нет связи — сохранено локально", true);
    setTimeout(scheduleFlush, 8000);
  }
}
setInterval(()=>{ if(pendingQueue.length) flushQueue(); }, 15000);

function showToast(text, bad){
  const t = document.getElementById("toast");
  document.getElementById("toastText").textContent = text;
  t.classList.toggle("bad", !!bad);
  t.classList.add("show");
  clearTimeout(showToast._h);
  showToast._h = setTimeout(()=>t.classList.remove("show"), 1800);
}

function getEntry(type, slot, dept){
  const s = slot || "_";
  if(!dayState[type]) dayState[type] = {};
  if(!dayState[type][s]) dayState[type][s] = {};
  if(!dayState[type][s][dept]) dayState[type][s][dept] = { done:false, note:"" };
  return dayState[type][s][dept];
}
function setDone(type, slot, dept, done){
  const e = getEntry(type, slot, dept);
  e.done = done;
  saveLocalCache(currentDate);
  queuePush({ date: currentDate, type, slot: slot || "", entries:[{ dept, done: e.done, note: e.note }] });
}
function setNote(type, slot, dept, note){
  const e = getEntry(type, slot, dept);
  e.note = note;
  saveLocalCache(currentDate);
  queuePush({ date: currentDate, type, slot: slot || "", entries:[{ dept, done: e.done, note: e.note }] });
}
function markAll(type, slot){
  const entries = ALL_DEPTS.map(dept=>{
    const e = getEntry(type, slot, dept);
    e.done = true;
    return { dept, done:true, note:e.note };
  });
  saveLocalCache(currentDate);
  queuePush({ date: currentDate, type, slot: slot || "", entries });
  render();
}

function sectionCount(sec, slot){
  const s = slot || "_";
  const bucket = (dayState[sec.type] && dayState[sec.type][s]) || {};
  let done = 0;
  ALL_DEPTS.forEach(d=>{ if(bucket[d] && bucket[d].done) done++; });
  return done;
}
function tabProgress(tabKey){
  const sections = SECTIONS[tabKey];
  let done = 0, total = 0;
  sections.forEach(sec=>{
    const slot = sec.slotted ? currentSlot : "";
    total += ALL_DEPTS.length;
    done += sectionCount(sec, slot);
  });
  return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}
function updateProgressUI(){
  const p = tabProgress(currentTab);
  const ring = document.getElementById("progressRing");
  ring.style.setProperty("--pct", p.pct);
  document.getElementById("sectionDesc").textContent = TAB_DESC[currentTab];
}

function render(){
  const main = document.getElementById("main");
  main.innerHTML = "";

  const sections = SECTIONS[currentTab];
  const slotted = sections.some(s=>s.slotted);

  if(slotted){
    const row = document.createElement("div");
    row.className = "slot-row";
    SLOTS.forEach(s=>{
      const chip = document.createElement("button");
      chip.className = "slot-chip" + (s===currentSlot ? " active":"");
      chip.textContent = s;
      chip.onclick = ()=>{ currentSlot = s; render(); };
      row.appendChild(chip);
    });
    main.appendChild(row);
  }

  sections.forEach(sec=>{
    const slot = sec.slotted ? currentSlot : "";
    const doneCount = sectionCount(sec, slot);
    const box = document.createElement("div");
    box.className = "section";

    const head = document.createElement("div");
    head.className = "section-head";
    const top = document.createElement("div");
    top.className = "section-head-top";
    const left = document.createElement("div");
    left.innerHTML = `<h2>${sec.label}</h2><div class="section-sub">${sec.sub}</div>`;
    const right = document.createElement("div");
    right.className = "head-right";
    const pp = document.createElement("span");
    pp.className = "progress-pill" + (doneCount===ALL_DEPTS.length ? " full":"");
    pp.textContent = doneCount+"/"+ALL_DEPTS.length;
    const wt = document.createElement("span"); wt.className="weight-tag"; wt.textContent = "вес "+sec.weight;
    right.appendChild(pp); right.appendChild(wt);
    top.appendChild(left); top.appendChild(right);
    head.appendChild(top);

    const allBtn = document.createElement("button");
    allBtn.className = "mark-all";
    allBtn.textContent = "✓ Отметить все отделы выполнено";
    allBtn.onclick = ()=>markAll(sec.type, slot);
    head.appendChild(allBtn);
    box.appendChild(head);

    ALL_DEPTS.forEach((dept, idx)=>{
      const entry = getEntry(sec.type, slot, dept);
      const row = document.createElement("div");
      row.className = "dept-row";

      const avatar = document.createElement("div");
      avatar.className = "dept-avatar";
      avatar.style.background = DEPT_COLORS[dept] || "#8b93a1";
      avatar.textContent = deptInitial(dept);

      const col = document.createElement("div");
      col.className = "dept-col";
      const nameEl = document.createElement("div");
      nameEl.className = "dept-name";
      nameEl.textContent = dept;
      if(entry.note){ const nd=document.createElement("span"); nd.className="note-dot"; nd.style.marginLeft="6px"; nameEl.appendChild(nd); }
      col.appendChild(nameEl);
      if(dept==="Двери"){
        const sub = document.createElement("span");
        sub.className="dept-sub"; sub.textContent="только учёт";
        col.appendChild(sub);
      }

      if(sec.note){
        const noteBtn = document.createElement("button");
        noteBtn.className = "note-toggle";
        noteBtn.textContent = entry.note ? "Замечание ✎" : "+ замечание";
        const input = document.createElement("input");
        input.className = "note-input" + (entry.note ? " show":"");
        input.placeholder = "Комментарий (необязательно)";
        input.value = entry.note || "";
        input.onblur = ()=> setNote(sec.type, slot, dept, input.value.trim());
        input.onclick = (ev)=> ev.stopPropagation();
        noteBtn.onclick = (ev)=>{
          ev.stopPropagation();
          input.classList.toggle("show");
          if(input.classList.contains("show")) input.focus();
        };
        col.appendChild(noteBtn);
        col.appendChild(input);
      }

      const toggle = document.createElement("div");
      toggle.className = "toggle" + (entry.done ? " on":"");
      toggle.innerHTML = '<div class="knob"></div>';

      row.onclick = ()=>{
        const newVal = !entry.done;
        entry.done = newVal;
        toggle.classList.toggle("on", newVal);
        setDone(sec.type, slot, dept, newVal);
        pp.textContent = sectionCount(sec, slot)+"/"+ALL_DEPTS.length;
        pp.classList.toggle("full", sectionCount(sec, slot)===ALL_DEPTS.length);
        updateProgressUI();
      };

      row.appendChild(avatar);
      row.appendChild(col);
      row.appendChild(toggle);
      box.appendChild(row);
    });

    main.appendChild(box);
  });

  const hint = document.createElement("div");
  hint.className = "hint";
  hint.textContent = "Все отметки сохраняются мгновенно";
  main.appendChild(hint);

  updateProgressUI();
}

document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentTab = btn.dataset.tab;
    render();
  };
});
document.querySelector('.tab-btn[data-tab="daily5"]').classList.add("active");

document.getElementById("datePicker").value = currentDate;
document.getElementById("datePicker").onchange = (e)=>{
  currentDate = e.target.value || todayStr();
  fetchDay(currentDate);
};
document.getElementById("todayBtn").onclick = ()=>{
  currentDate = todayStr();
  document.getElementById("datePicker").value = currentDate;
  fetchDay(currentDate);
};

function tickClock(){
  const d = new Date();
  document.getElementById("clock").textContent =
    String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}
tickClock(); setInterval(tickClock, 30000);

if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}

BASE_URL = getApiUrl();
if(!BASE_URL){
  document.getElementById("configModal").classList.add("show");
  document.getElementById("apiUrlInput").focus();
} else {
  loadQueue();
  fetchDay(currentDate);
  if(pendingQueue.length) scheduleFlush();
}
</script>
